# U-Cast configuration for ERA5 1.5-degree forecasting inference.

# ── Model architecture (DhariwalUNet / ADM) ───────────────────────────────────
model:
  model_channels: 320
  channel_mult: [1, 2, 3, 4]
  num_blocks: 4
  dropout: 0.1
  attn_levels: [2, 3]

# ── Data module ───────────────────────────────────────────────────────────────
datamodule:
  dataset: 1959-2023_01_10-6h-240x121_equiangular_with_poles_conservative.zarr
  window: 2
  hourly_resolution: 12
  static_fields:
    - land_sea_mask
    - geopotential_at_surface
  forcing_fields:
    - year_progress_sin
    - year_progress_cos
    - day_progress_sin
    - day_progress_cos
  input_vars:
